# ------------------------------------------------------------
# Binding Stats
# ------------------------------------------------------------
# Each Binding type applies delta modifiers on top of the
# material base stats. These affect Attack Rating (speed),
# Durability, Crit Rate bonus, and minor flat Attack bonuses.
#
# attack_rating         - the base attack speed this binding produces
# durability_multiplier - scalar applied to the material's base durability
# crit_rate_bonus       - flat addition to material's crit_rate_base
# attack_bonus          - flat addition to rolled base attack
# ------------------------------------------------------------
binding_stats:

# MateriaType.STRING - light, fast, crit-favoring
# Fast tempo — dagger/rapier feel
  STRING:
    attack_rating_min: 2.0
    attack_rating_max: 4.5
    durability_multiplier: 0.75
    crit_rate_bonus: 0.1
    attack_bonus: 0

# MateriaType.PELT - balanced, slightly durable
# Neutral tempo — standard sword feel
  PELT:
    attack_rating_min: 2.0
    attack_rating_max: 4.0
    durability_multiplier: 1.25
    crit_rate_bonus: 0.05
    attack_bonus: 4

# MateriaType.LEATHER - heavy grip, trades speed for damage and durability
# Slow tempo — greatsword/hammer feel
  LEATHER:
    attack_rating_min: 1.0
    attack_rating_max: 2.5
    durability_multiplier: 1.75
    crit_rate_bonus: -0.1
    attack_bonus: 10

# ============================================================
# ARMOR ECHO STAT RANGES
# Each key must match an EchoMaterial enum name (case-insensitive).
# Durability ranges here feed into ArmorStatRange; the binding's
# durability_multiplier is applied on top during stat resolution.
#
# Stat reference:
#   armor_rating        — flat damage reduction points (analogous to vanilla armor value)
#   block_rate          — [0.0, 1.0] fraction of incoming hits that trigger the block mitigation path
#   crit_armor_rating   — additional armor rating applied only against critical hits
#   crit_block_rate     — [0.0, 1.0] chance to fully negate a critical hit's bonus damage
#   durability          — raw durability before the binding multiplier is applied
# ============================================================

armor_stats:

  LEATHER:
    armor_rating_min:       5
    armor_rating_max:       75
    block_rate_min:         0.01
    block_rate_max:         0.05
    crit_armor_rating_min:  1
    crit_armor_rating_max:  10
    crit_block_rate_min:    0.01
    crit_block_rate_max:    0.05
    durability_min:         100
    durability_max:         150

  IRON:
